<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good Libations - Home</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
    }

    .video-container {
      position: relative;
      width: 80%;
      max-width: 800px;
      margin: 40px auto;
    }

    video {
      width: 100%;
      background: black;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .overlay input {
      padding: 10px;
      font-size: 16px;
      text-align: center;
      border: 1px solid white;
      background: transparent;
      color: white;
    }

    .poster {
      position: absolute;
      inset: 0;
      background: url("JoshLeos.png") center/cover no-repeat;
    }
  </style>
</head>

<body>

<h1>GOOD LIBATIONS</h1>

<div class="video-container">

  <div class="poster" id="poster"></div>

  <video id="video" muted playsinline controls>
    <source src="https://devgood-libations.b-cdn.net/new-josh-upload.mp4" type="video/mp4">
  </video>

  <div class="overlay" id="overlay">
    <div style="margin-bottom:10px;">ENTER PASSWORD</div>
    <input type="password" id="passwordInput" placeholder="Password" />
  </div>

</div>

<script>
const overlay = document.getElementById("overlay");
const poster = document.getElementById("poster");
const video = document.getElementById("video");
const passwordInput = document.getElementById("passwordInput");

async function submitPassword() {
  const password = passwordInput.value;

  console.log("Sending password:", password);

  try {
    const res = await fetch("/.netlify/functions/check-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ password })
    });

    const data = await res.json();

    console.log("Response:", data);

    if (data.success || data.match) {
      overlay.style.display = "none";
      poster.style.display = "none";
      video.play().catch(() => {});
    } else {
      alert("Wrong password");
      passwordInput.value = "";
    }
  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}

passwordInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    submitPassword();
  }
});
</script>

</body>
</html>
